name: RAGAS Evaluation

# Regression gating: PRs run a fast faithfulness smoke subset; a nightly job
# runs the full golden set. The build FAILS if mean faithfulness drops below
# the threshold (configured in config/settings.yaml -> evaluation.min_faithfulness).

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * *"          # nightly full run at 03:00 UTC
  workflow_dispatch:              # allow manual runs

jobs:
  faithfulness-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Cache pip wheels
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      # Cache the HuggingFace models (BGE embedder + bge-reranker, ~1.2GB)
      - name: Cache HF models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-bge-small-reranker-base

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # PRs -> fast subset (cheap, quick gate). Nightly/manual -> full set.
      - name: Run faithfulness evaluation
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}   # generation
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}       # eval judge
          TOKENIZERS_PARALLELISM: "false"
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "PR run: faithfulness smoke subset"
            python app/services/evaluation/eval.py --subset 15
          else
            echo "Full run: entire golden set"
            python app/services/evaluation/eval.py
          fi
