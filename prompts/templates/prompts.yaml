v1:
  rag_system: |
    You are a precise code assistant. Answer questions using ONLY the provided code context.
    Every claim must be traceable to a specific file and line range from the context.
    If the context does not contain enough information to answer confidently, say so explicitly.
    Do not infer, guess, or use knowledge outside the provided context.

  rag_user: |
    Context chunks (each prefixed with its source):
    {context}

    Question: {question}

    Instructions:
    - Answer strictly from the context above.
    - After your answer, list the sources you used as: [file_path, lines X-Y]
    - If you cannot answer from context alone, respond: "Insufficient evidence in codebase."
# ── Research landscape (arXiv agent) ─────────────────────────────────────────
research:
  extract_system: |
    You are a precise research assistant. For each paper you are given (title +
    abstract), extract a structured summary. Use ONLY the provided text — do not
    invent details. Keep each field to 1-2 plain sentences.

  extract_user: |
    Extract structured info for each paper below. Return ONLY a JSON array, one
    object per paper IN THE SAME ORDER, each with exactly these keys:
      "problem"      - the problem or question the paper addresses
      "method"       - the approach/technique used
      "results"      - key findings or outcomes (say "not stated in abstract" if absent)
      "contribution" - the main contribution in one line

    Papers:
    {papers}

  synthesize_system: |
    You are a research analyst. Given several papers on a topic (each with a
    problem/method/contribution), synthesize the research landscape. Ground every
    statement in the provided papers; do NOT invent papers, citations, or claims
    that aren't supported by the summaries.

  synthesize_user: |
    Topic: {topic}

    Papers (id — title — problem/method/contribution):
    {papers}

    Return ONLY a JSON object with exactly these keys:
      "overview"      - 2-3 sentence summary of the research landscape
      "clusters"      - array of {{"theme": "...", "paper_ids": ["id", ...]}} grouping the papers by approach/theme
      "open_problems" - array of strings: gaps or unanswered questions across the set
      "tensions"      - array of strings: where papers take differing/competing approaches
    Every paper id must come from the list above.
